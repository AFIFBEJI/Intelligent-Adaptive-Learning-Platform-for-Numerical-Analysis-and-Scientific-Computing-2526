<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive Learning Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

      /* Hide ALL Google Translate UI */
      .goog-te-banner-frame { display: none !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .goog-tooltip, .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background: none !important; box-shadow: none !important; }
      .skiptranslate { display: none !important; height: 0 !important; overflow: hidden !important; }
      #google_translate_element { position: fixed; top: -9999px; left: -9999px; }
      body { top: 0 !important; position: static !important; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="google_translate_element"></div>

    <script type="module" src="/src/main.ts"></script>

    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,fr',
          autoDisplay: false
        }, 'google_translate_element');
      }

      window.setLanguage = function(lang) {
        if (lang === 'en') {
          // Clear all Google Translate cookies
          var cookies = ['googtrans'];
          var domains = ['', location.hostname, '.' + location.hostname];
          var paths = ['/', ''];
          for (var i = 0; i < cookies.length; i++) {
            for (var j = 0; j < domains.length; j++) {
              for (var k = 0; k < paths.length; k++) {
                var cookie = cookies[i] + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC';
                if (paths[k]) cookie += '; path=' + paths[k];
                if (domains[j]) cookie += '; domain=' + domains[j];
                document.cookie = cookie;
              }
            }
          }
          // Save preference then reload to get original English
          localStorage.setItem('app_lang', 'en');
          location.reload();
        } else {
          // Translate to French
          var tries = 0;
          function attempt() {
            var combo = document.querySelector('.goog-te-combo');
            if (combo) {
              combo.value = lang;
              combo.dispatchEvent(new Event('change'));
              localStorage.setItem('app_lang', lang);
            } else if (tries < 30) {
              tries++;
              setTimeout(attempt, 200);
            }
          }
          attempt();
        }
      }

      // Auto-restore French if previously selected
      var saved = localStorage.getItem('app_lang');
      if (saved === 'fr') {
        setTimeout(function() { window.setLanguage('fr'); }, 1200);
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
