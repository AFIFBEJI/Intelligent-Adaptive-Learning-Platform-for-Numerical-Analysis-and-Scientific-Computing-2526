:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="106">quiz_resultats</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="120">concept_mastery</text><rect fill="#fce7f3" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="900.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="995.0" y="92">graph_service</text><rect fill="#ede9fe" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="1110.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="1205.0" y="92">Neo4j</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="1205.0" y="106">Concept, Resource</text><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="155.0" x2="155.0" y1="130" y2="850" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="365.0" x2="365.0" y1="130" y2="850" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="575.0" x2="575.0" y1="130" y2="850" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="785.0" x2="785.0" y1="130" y2="850" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="995.0" x2="995.0" y1="130" y2="850" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="1205.0" x2="1205.0" y1="130" y2="850" /><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="155.0" x2="365.0" y1="150" y2="150" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="260.0" y="144">1: submit answers</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="365.0" x2="575.0" y1="195" y2="195" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="470.0" y="189">2: POST /quiz/{id}/submit {answers}</text><path d="M575.0,240 L615.0,240 L615.0,260 L578.0,260" fill="none" marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.5" /><text style="font:11px Helvetica,Arial; fill:#111" x="620.0" y="243">3: grade answers → score (0-100)</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="785.0" y1="285" y2="285" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="279">4: INSERT INTO quiz_resultats</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="785.0" x2="575.0" y1="330" y2="330" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="324">5: QuizResult{id, score}</text><path d="M575.0,375 L615.0,375 L615.0,395 L578.0,395" fill="none" marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.5" /><text style="font:11px Helvetica,Arial; fill:#111" x="620.0" y="378">6: update_mastery(etudiant, concept, score)</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="785.0" y1="420" y2="420" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="414">7: UPSERT concept_mastery (niveau_maitrise)</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="785.0" x2="575.0" y1="465" y2="465" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="459">8: OK</text><polygon fill="#fef9c3" points="500.0,500 640.0,500 650.0,510 650.0,530 500.0,530" stroke="#ca8a04" stroke-width="1" /><text style="font:italic 10px Helvetica,Arial; fill:#713f12" text-anchor="middle" x="575.0" y="520">opt: mastery &lt; 60 → needs remediation</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="995.0" y1="555" y2="555" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="549">9: get_remediation(concept_id)</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="995.0" x2="1205.0" y1="600" y2="600" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="1100.0" y="594">c.id=? RETURN r</text><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="1100.0" y="580">10: MATCH (r:Resource)-[:REMEDIATES_TO]-&gt;(c) WHERE</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="1205.0" x2="995.0" y1="645" y2="645" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="1100.0" y="639">11: [Resource, ...]</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="995.0" x2="575.0" y1="690" y2="690" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="684">12: ranked resources</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="575.0" x2="365.0" y1="735" y2="735" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="470.0" y="729">13: 200 {score, mastery, remediation}</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="365.0" x2="155.0" y1="780" y2="780" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="260.0" y="774">14: show score + remediation list</text></svg>