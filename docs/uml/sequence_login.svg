<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="760px" version="1.1" viewBox="0 0 1150 760" width="1150px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow_sync" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M0,0 L10,5 L0,10 z" fill="#111" /></marker><marker id="arrow_ret" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M0,0 L10,5 L0,10 z" fill="#555" /></marker></defs><rect fill="white" height="760" width="1150" x="0" y="0" /><text style="font:bold 18px Helvetica,Arial,sans-serif; fill:#111" text-anchor="middle" x="575.0" y="40">Sequence Diagram — Login Flow (POST /auth/login)</text><rect fill="#fef3c7" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="60.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="155.0" y="92">Étudiant</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="155.0" y="106">(Browser)</text><rect fill="#dbeafe" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="270.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="365.0" y="92">React SPA</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="365.0" y="106">LoginPage.tsx</text><rect fill="#d1fae5" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="480.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="575.0" y="92">FastAPI</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="575.0" y="106">/auth/login</text><rect fill="#fce7f3" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="690.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="92">core/security</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="106">bcrypt + JWT</text><rect fill="#e0e7ff" height="60" rx="4" ry="4" stroke="#374151" stroke-width="1.5" width="190" x="900.0" y="70" /><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="995.0" y="92">PostgreSQL</text><text style="font:bold 11px Helvetica,Arial; fill:#111" text-anchor="middle" x="995.0" y="106">etudiants</text><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="155.0" x2="155.0" y1="130" y2="670" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="365.0" x2="365.0" y1="130" y2="670" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="575.0" x2="575.0" y1="130" y2="670" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="785.0" x2="785.0" y1="130" y2="670" /><line stroke="#9ca3af" stroke-dasharray="4,3" stroke-width="1" x1="995.0" x2="995.0" y1="130" y2="670" /><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="155.0" x2="365.0" y1="150" y2="150" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="260.0" y="144">1: fill (email, password) + click Login</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="365.0" x2="575.0" y1="195" y2="195" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="470.0" y="189">2: POST /auth/login (OAuth2PasswordRequestForm)</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="995.0" y1="240" y2="240" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="234">3: SELECT * FROM etudiants WHERE email=:email</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="995.0" x2="575.0" y1="285" y2="285" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="785.0" y="279">4: Etudiant row (bcrypt hash)</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="785.0" y1="330" y2="330" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="324">5: verify_password(plain, hash)</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="785.0" x2="575.0" y1="375" y2="375" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="369">6: True</text><line marker-end="url(#arrow_sync)" stroke="#111" stroke-width="1.8" x1="575.0" x2="785.0" y1="420" y2="420" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="414">7: create_access_token({sub: id})</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="785.0" x2="575.0" y1="465" y2="465" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="680.0" y="459">8: JWT (HS256, 30 min)</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="575.0" x2="365.0" y1="510" y2="510" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="470.0" y="504">9: 200 {access_token, token_type: bearer}</text><line marker-end="url(#arrow_ret)" stroke="#555" stroke-dasharray="6,3" stroke-width="1.8" x1="365.0" x2="155.0" y1="555" y2="555" /><text style="font:11px Helvetica,Arial; fill:#111" text-anchor="middle" x="260.0" y="549">10: save token → redirect /dashboard</text><polygon fill="#fef9c3" points="710.0,590 850.0,590 860.0,600 860.0,620 710.0,620" stroke="#ca8a04" stroke-width="1" /><text style="font:italic 10px Helvetica,Arial; fill:#713f12" text-anchor="middle" x="785.0" y="610">alt: invalid → 401 Unauthorized</text></svg>